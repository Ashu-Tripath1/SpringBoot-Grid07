# ─── Grid07 Virality Engine — Local Infrastructure ───────────────────────────
#
# Usage:
#   docker compose up -d          # start Postgres + Redis in the background
#   docker compose down           # stop and remove containers
#   docker compose down -v        # also remove persistent volumes (wipes data)
#
# The Spring Boot application is intentionally excluded from this file so it
# can be run locally via Maven for fast iteration:
#   ./mvnw spring-boot:run
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: grid07-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       grid07
      POSTGRES_USER:     grid07_user
      POSTGRES_PASSWORD: grid07_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid07_user -d grid07"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grid07-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Commander (optional UI) ──────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: grid07-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
